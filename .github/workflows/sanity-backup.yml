name: Weekly Sanity Dataset Backup

on:
  schedule:
    # Every Sunday at 04:00 UTC
    - cron: "0 4 * * 0"
  workflow_dispatch:

jobs:
  backup:
    name: Export Sanity production dataset
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Export Sanity dataset
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
        run: |
          bunx sanity dataset export production /tmp/backup-$(date +%Y%m%d).tar.gz

      - name: Upload backup artifact
        uses: actions/upload-artifact@v7
        with:
          name: sanity-backup-${{ github.run_id }}
          path: /tmp/backup-*.tar.gz
          retention-days: 90
          if-no-files-found: error

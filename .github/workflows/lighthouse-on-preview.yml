name: Lighthouse

on:
  deployment_status:

jobs:
  lighthouse:
    name: Lighthouse
    if: >
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment != 'Production' &&
      github.event.deployment_status.target_url != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout deployment ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Compose target URLs
        id: urls
        env:
          PREVIEW_URL: ${{ github.event.deployment_status.target_url }}
        run: |
          {
            echo "list<<EOF"
            echo "${PREVIEW_URL}/"
            echo "${PREVIEW_URL}/about"
            echo "${PREVIEW_URL}/committees"
            echo "${PREVIEW_URL}/committees/trading"
            echo "${PREVIEW_URL}/join"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Audit URLs with Lighthouse
        id: lighthouse_audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ steps.urls.outputs.list }}
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 1

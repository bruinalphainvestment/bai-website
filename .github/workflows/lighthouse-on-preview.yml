name: Lighthouse

on:
  repository_dispatch:
    types:
      - vercel.deployment.ready

permissions:
  contents: read
  statuses: write
  checks: write

jobs:
  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Report pending status to Vercel
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Lighthouse"

      - name: Decide whether to audit
        id: gate
        env:
          REF: ${{ github.event.client_payload.git.ref }}
        run: |
          if [[ "$REF" == dependabot/* || "$REF" == refs/heads/dependabot/* ]]; then
            echo "Skipping Lighthouse audit for dependabot branch: $REF"
            echo "audit=false" >> "$GITHUB_OUTPUT"
          else
            echo "audit=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout deployment ref
        if: steps.gate.outputs.audit == 'true'
        uses: vercel/repository-dispatch/actions/checkout@v1

      - name: Compose target URLs
        if: steps.gate.outputs.audit == 'true'
        id: urls
        env:
          PREVIEW_URL: ${{ github.event.client_payload.url }}
        run: |
          {
            echo "list<<EOF"
            echo "${PREVIEW_URL}/"
            echo "${PREVIEW_URL}/about"
            echo "${PREVIEW_URL}/committees"
            echo "${PREVIEW_URL}/committees/trading"
            echo "${PREVIEW_URL}/join"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Audit URLs with Lighthouse
        if: steps.gate.outputs.audit == 'true'
        id: lighthouse_audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ steps.urls.outputs.list }}
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          # 3 runs → median scoring smooths out single-run noise from cold
          # Vercel function starts, GitHub runner CPU jitter, and network
          # variance. Adds ~4 min to CI; well under the 15-min timeout.
          runs: 3

name: Lighthouse

on:
  repository_dispatch:
    types:
      - vercel.deployment.ready

jobs:
  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Report pending status to Vercel
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Lighthouse"

      - name: Checkout deployment ref
        uses: vercel/repository-dispatch/actions/checkout@v1

      - name: Compose target URLs
        id: urls
        env:
          PREVIEW_URL: ${{ github.event.client_payload.url }}
        run: |
          {
            echo "list<<EOF"
            echo "${PREVIEW_URL}/"
            echo "${PREVIEW_URL}/about"
            echo "${PREVIEW_URL}/committees"
            echo "${PREVIEW_URL}/committees/trading"
            echo "${PREVIEW_URL}/join"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Audit URLs with Lighthouse
        id: lighthouse_audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ steps.urls.outputs.list }}
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 1

name: Lighthouse

on:
  repository_dispatch:
    types:
      - vercel.deployment.ready

permissions:
  contents: read
  statuses: write
  checks: write

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      audit: ${{ steps.gate.outputs.audit }}
    steps:
      - name: Decide whether to audit
        id: gate
        env:
          REF: ${{ github.event.client_payload.git.ref }}
        run: |
          if [[ "$REF" == dependabot/* || "$REF" == refs/heads/dependabot/* ]]; then
            echo "Skipping Lighthouse audit for dependabot branch: $REF"
            echo "audit=false" >> "$GITHUB_OUTPUT"
          else
            echo "audit=true" >> "$GITHUB_OUTPUT"
          fi

  pending:
    name: Report pending
    needs: gate
    if: needs.gate.outputs.audit == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Report pending status to Vercel
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Lighthouse"

  audit:
    name: Audit ${{ matrix.path }}
    needs: gate
    if: needs.gate.outputs.audit == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      # fail-fast off so a regression on one URL doesn't hide regressions on
      # the other URLs in the same run. We need full visibility.
      fail-fast: false
      matrix:
        path:
          - "/"
          - "/about"
          - "/committees"
          - "/committees/trading"
          - "/join"
    steps:
      - name: Checkout deployment ref
        uses: vercel/repository-dispatch/actions/checkout@v1

      - name: Sanitize matrix path for artifact name
        id: slug
        env:
          MATRIX_PATH: ${{ matrix.path }}
        run: |
          slug=$(echo "$MATRIX_PATH" | sed 's|/|-|g; s|^-||; s|-$||')
          [[ -z "$slug" ]] && slug="home"
          echo "value=$slug" >> "$GITHUB_OUTPUT"

      - name: Audit URL with Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ github.event.client_payload.url }}${{ matrix.path }}
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          # 3 runs → median scoring smooths out single-run noise from cold
          # Vercel function starts, GitHub runner CPU jitter, and network
          # variance. Each matrix job runs on its own isolated runner, so
          # the 3 runs per URL stay sequential (CPU contention would defeat
          # the point of multi-run median) while different URLs are audited
          # in parallel.
          runs: 3
          artifactName: lighthouse-${{ steps.slug.outputs.value }}

  aggregate:
    # Single unified Lighthouse pass/fail signal. Vercel watches the workflow's
    # overall state; this job rolls up the matrix result into one clear status.
    name: Lighthouse
    needs: [gate, audit]
    if: always() && needs.gate.outputs.audit == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Roll up matrix result
        env:
          AUDIT_RESULT: ${{ needs.audit.result }}
        run: |
          if [[ "$AUDIT_RESULT" == "success" ]]; then
            echo "All Lighthouse audits passed"
            exit 0
          fi
          echo "One or more Lighthouse audits failed (matrix result: $AUDIT_RESULT)"
          exit 1

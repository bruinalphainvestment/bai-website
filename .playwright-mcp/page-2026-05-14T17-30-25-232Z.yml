        - generic [ref=e16]:
          - heading "Our Story" [level=1] [ref=e17]
          - paragraph [ref=e18]: Founded in Spring 2026, Bruin Alpha Investment was built to bridge the gap in UCLA's finance club landscape by combining broad accessibility with deep, specialized training.
        - generic [ref=e20]:
          - paragraph [ref=e21]: The vision for Bruin Alpha Investment began in the Spring of 2026. Mack Haymond and four co-founders recognized a clear gap in the existing financial organization landscape at UCLA. While other organizations focused heavily on single disciplines or maintained extremely narrow funnels for entry, there was a profound need for a community that offered both an inclusive starting point and a pathway to highly specialized expertise.
          - paragraph [ref=e22]: We realized that true financial education doesn't happen in silos. It happens when students are exposed to the full spectrum of the industry—from investment banking and wealth management to trading and accounting—before they are forced to specialize.
          - paragraph [ref=e23]: By establishing our multi-committee structure, we ensure that every member receives blanket coverage of the financial world during their rotational period, followed by rigorous, hands-on development within their chosen focus area. Our goal is not just to teach finance, but to execute real, meaningful projects that deliver tangible value to our members and the broader community.
        - blockquote [ref=e25]:
          - paragraph [ref=e26]: “We are starting it, we are building it, so we can decide what direction it wants to go.”
          - generic [ref=e27]: — Mack Haymond, Spring 2026
        - generic [ref=e28]:
          - heading "What Sets Us Apart" [level=2] [ref=e29]
          - generic [ref=e30]:
            - generic [ref=e31]:
              - heading "Blanket Coverage" [level=3] [ref=e32]
              - paragraph [ref=e33]: We don't limit our focus to just one area of finance. Our structure is designed to expose members to the entire landscape, ensuring a well-rounded understanding of the markets before deep specialization.
            - generic [ref=e34]:
              - heading "Real Projects" [level=3] [ref=e35]
              - paragraph [ref=e36]: Theory only goes so far. Our committees operate through hands-on, deliverable-driven initiatives rather than passive lectures, ensuring every member builds a tangible track record.
            - generic [ref=e37]:
              - heading "Rotational Program" [level=3] [ref=e38]
              - paragraph [ref=e39]: Our unique onboarding pipeline allows new analysts to experience every committee over a 10-week period, guaranteeing that their final placement aligns perfectly with their skills and interests.
